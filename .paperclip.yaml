projects:
  teck-cloud:
    workspaces:
      main:
        name: Teck.Cloud
        sourceType: git_repo
        repoUrl: https://github.com/Teck-Lab/Teck.Cloud.git
        repoRef: main
        defaultRef: main
        isPrimary: true
  teck-gitops:
    workspaces:
      main:
        name: Teck.GitOps
        sourceType: git_repo
        repoUrl: https://github.com/Teck-Lab/Teck.GitOps.git
        repoRef: main
        defaultRef: main
        isPrimary: true
  teck-terraform:
    workspaces:
      main:
        name: Teck.Terraform
        sourceType: git_repo
        repoUrl: https://github.com/Teck-Lab/Teck.Terraform.git
        repoRef: main
        defaultRef: main
        isPrimary: true
  teck-web:
    workspaces:
      main:
        name: Teck.Web
        sourceType: git_repo
        repoUrl: https://github.com/Teck-Lab/Teck.Web.git
        repoRef: main
        defaultRef: main
        isPrimary: true
routines:
  daily-security-scan:
    title: Daily Security Scan
    assignee:
      resourceKind: agent
      resourceKey: security-engineer
    triggers:
    - kind: schedule
      cronExpression: 0 8 * * *
      enabled: true
  weekly-architecture-review:
    title: Weekly Architecture Review
    assignee:
      resourceKind: agent
      resourceKey: cto
    triggers:
    - kind: schedule
      cronExpression: 0 9 * * 1
      enabled: true
  daily-deployment-check:
    title: Daily Deployment Health Check
    assignee:
      resourceKind: agent
      resourceKey: qa-team-lead
    triggers:
    - kind: schedule
      cronExpression: 0 7 * * *
      enabled: true
  weekly-spend-review:
    title: Weekly Model Spend Review
    assignee:
      resourceKind: agent
      resourceKey: cfo
    triggers:
    - kind: schedule
      cronExpression: 0 10 * * 5
      enabled: true
  monday-market-brief:
    title: Monday Market Intelligence Brief
    assignee:
      resourceKind: agent
      resourceKey: cmo
    triggers:
    - kind: schedule
      cronExpression: 0 8 * * 1
      enabled: true
